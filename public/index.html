<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadifyBySam | Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="auth-body">
  <div id="loader" class="loader loader-vibe">
    <div class="speeder-wrap">
      <div class="speeder-body">
        <span><span></span><span></span><span></span><span></span></span>
        <div class="base"><span></span><div class="face"></div></div>
      </div>
      <div class="longfazers"><span></span><span></span><span></span><span></span></div>
      <h2 id="loader-word" class="loader-text">Reading</h2>
    </div>
  </div>

  <main id="auth-screen" class="hidden">
    <div id="auth-shell" class="auth-shell">
      <div class="form-container sign-up-container">
        <form id="signup-form" class="auth-panel-form">
          <h2>Create Account</h2>
          <input id="signup-name" placeholder="Full Name" required />
          <input id="signup-email" type="email" placeholder="Email" required />
          <input id="signup-password" type="password" placeholder="Password" required />
          <select id="signup-role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
          <button type="submit">Sign Up</button>
          <p id="signup-msg" class="status"></p>
        </form>
      </div>

      <div class="form-container sign-in-container">
        <form id="login-form" class="auth-panel-form">
          <h2>Sign In</h2>
          <input id="login-email" type="email" placeholder="Email" required />
          <input id="login-password" type="password" placeholder="Password" required />
          <button type="submit">Sign In</button>
          <p id="login-msg" class="status"></p>
        </form>
      </div>

      <div class="overlay-container">
        <div class="overlay">
          <div class="overlay-panel overlay-left">
            <h2>Welcome Back!</h2>
            <p>Already have an account? Login and continue your reading journey.</p>
            <button class="ghost-btn" id="show-signin">Sign In</button>
          </div>
          <div class="overlay-panel overlay-right">
            <h2>Hello Reader!</h2>
            <p>Don’t have an account? Register and start exploring books.</p>
            <button class="ghost-btn" id="show-signup">Sign Up</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/script.js"></script>
</body>
</html>
