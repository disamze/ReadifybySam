<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadifyBySam | Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>

<body class="auth-body">
  <div id="loader" class="loader loader-vibe">
        <div class="speeder-wrap">
            <div class="speeder-body">
                <span><span></span><span></span><span></span><span></span></span>
                <div class="base"><span></span>
                    <div class="face"></div>
                </div>
            </div>
            <div class="longfazers"><span></span><span></span><span></span><span></span></div>
            <h2 id="loader-word" class="loader-text">Reading</h2>
        </div>
    </div>

    <div class="container">
        <div class="form-box login">
            <form id="login-form" class="auth-panel-form">
                <h1>Login</h1>
                <div class="input-box">
                    <input id="login-email" type="email" placeholder="Email" required>
                    <i class="bx bx-user"></i>
                </div>
                <div class="input-box">
                    <input id="login-password" type="password" placeholder="Password" required>
                    <i class="bx bx-lock-alt"></i>
                </div>
                <div class="role-switch" id="login-role-switch">
                    <button type="button" class="role-btn active" data-role="user">User</button>
                    <button type="button" class="role-btn" data-role="admin">Admin</button>
                    <span class="role-pill"></span>
                </div>

                <input type="hidden" id="login-role" value="user" />
                <button type="submit" class="btn">Login</button>

                <p id="login-msg" class="status"></p>
            </form>
        </div>
        <div class="form-box register">
            <form id="signup-form" class="auth-panel-form">
                <h1>Register</h1>
                <div class="input-box">
                    <input id="signup-name" type="text" placeholder="UserName" required>
                    <i class="bx bx-user"></i>
                </div>
                <div class="input-box">
                    <input id="signup-email" type="email" placeholder="Email" required>
                    <i class="bx bx-envelope"></i>
                </div>
                <div class="input-box">
                    <input id="signup-password" type="password" placeholder="Password" required>
                    <i class="bx bx-lock-alt"></i>
                </div>

                <button type="submit" class="btn">Register</button>

                <p id="signup-msg" class="status"></p>

            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
        <div class="bookshelf_wrapper">
            <ul class="books_list">
                <li class="book_item first"></li>
                <li class="book_item second"></li>
                <li class="book_item third"></li>
                <li class="book_item fourth"></li>
                <li class="book_item fifth"></li>
                <li class="book_item sixth"></li>
            </ul>
        </div>
    </div>

  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="/script.js"></script>
</body>

</html>
