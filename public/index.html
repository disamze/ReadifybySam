<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadifyBySam</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="loader" class="loader">
    <h1 id="loader-word">Reading</h1>
  </div>

  <div id="auth-screen" class="center-screen hidden">
    <div class="glass card">
      <h2>Welcome to ReadifyBySam</h2>
      <p>Reading begins here.</p>
      <form id="auth-form">
        <input id="name" placeholder="Full Name" />
        <input id="email" type="email" placeholder="Email" required />
        <input id="password" type="password" placeholder="Password" required />
        <div class="toggle-row">
          <label><input type="radio" name="role" value="user" checked /> User</label>
          <label><input type="radio" name="role" value="admin" /> Admin</label>
        </div>
        <div class="toggle-row">
          <button type="button" id="signup-btn">Signup</button>
          <button type="button" id="login-btn">Login</button>
        </div>
      </form>
      <p id="auth-msg"></p>
    </div>
  </div>

  <div id="app" class="hidden">
    <header class="hero parallax">
      <nav>
        <h1>ReadifyBySam</h1>
        <div>
          <span id="welcome"></span>
          <button id="logout-btn">Logout</button>
        </div>
      </nav>
      <div class="hero-content">
        <h2>Trusted Digital Learning Store</h2>
        <p>Buy books, grow skills, and access your approved library instantly.</p>
      </div>
    </header>

    <main id="user-view" class="hidden"></main>
    <main id="admin-view" class="hidden"></main>

    <section id="contact" class="section">
      <h3>Contact Us</h3>
      <form id="contact-form" class="contact-form">
        <input id="cname" placeholder="Your name" required />
        <input id="cemail" type="email" placeholder="Your email" required />
        <textarea id="cmessage" placeholder="Your message" required></textarea>
        <button>Send</button>
      </form>
      <p id="contact-msg"></p>
    </section>

    <footer>
      <p>© <span id="year"></span> ReadifyBySam • Reading begins here ✨</p>
    </footer>
  </div>

  <script src="/script.js"></script>
</body>
</html>
